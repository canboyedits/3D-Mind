<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Research architecture for streaming large MRI volumes to a browser</title>
  <desc id="desc">A large source MRI is converted into multiscale chunked anatomy, exact label chunks and lightweight previews, then progressively streamed into a browser cache and VTK.js GPU renderer.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-opacity=".14"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
  </defs>
  <rect width="1600" height="820" fill="#f8fafc"/>
  <text x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="750" fill="#0f172a">Research Direction: Browser Delivery for 1–10 GB MRI Studies</text>
  <text x="800" y="96" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" fill="#64748b">The browser should receive a view-dependent working set, not the complete monolithic study.</text>

  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(55,225)">
      <rect width="260" height="300" rx="28" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
      <g transform="translate(60,45)"><rect width="140" height="135" rx="18" fill="#1e293b"/><g stroke="#94a3b8" stroke-width="2" opacity=".7"><path d="M20 25h100M20 50h100M20 75h100M20 100h100"/><path d="M40 10v115M70 10v115M100 10v115"/></g><ellipse cx="70" cy="68" rx="45" ry="53" fill="#cbd5e1" opacity=".48"/></g>
      <text x="130" y="223" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">Source study</text>
      <text x="130" y="258" text-anchor="middle" font-size="18" fill="#475569">DICOM / NIfTI</text>
      <text x="130" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#b91c1c">Potentially 1–10 GB</text>
    </g>

    <g transform="translate(405,145)">
      <rect width="500" height="480" rx="30" fill="#fff" stroke="#a5b4fc" stroke-width="3"/>
      <text x="250" y="50" text-anchor="middle" font-size="29" font-weight="800" fill="#312e81">Derived web representation</text>
      <g transform="translate(35,85)">
        <rect width="430" height="92" rx="18" fill="#eef2ff"/>
        <text x="22" y="34" font-size="20" font-weight="700" fill="#3730a3">Multiscale anatomical pyramid</text>
        <text x="22" y="65" font-size="16" fill="#475569">Chunked intensities at several resolutions; fetch only visible/needed regions.</text>
      </g>
      <g transform="translate(35,197)">
        <rect width="430" height="92" rx="18" fill="#fef2f2"/>
        <text x="22" y="34" font-size="20" font-weight="700" fill="#991b1b">Exact tumor label chunks</text>
        <text x="22" y="65" font-size="16" fill="#475569">Integer labels use nearest-neighbour scaling and preserve ROI boundaries.</text>
      </g>
      <g transform="translate(35,309)">
        <rect width="430" height="92" rx="18" fill="#ecfdf5"/>
        <text x="22" y="34" font-size="20" font-weight="700" fill="#166534">Small first-view asset</text>
        <text x="22" y="65" font-size="16" fill="#475569">Low-resolution volume, surface, or optional splat preview for instant context.</text>
      </g>
      <text x="250" y="445" text-anchor="middle" font-size="16" fill="#64748b">Possible containers: DICOMweb for source access; Zarr / OME-Zarr-style chunks for derived data.</text>
    </g>

    <g transform="translate(1000,170)">
      <rect width="545" height="430" rx="30" fill="#fff" stroke="#86efac" stroke-width="3"/>
      <text x="272" y="52" text-anchor="middle" font-size="29" font-weight="800" fill="#166534">Browser working set</text>
      <g transform="translate(35,88)">
        <rect width="145" height="110" rx="18" fill="#dbeafe"/><text x="72" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">Manifest</text><text x="72" y="78" text-anchor="middle" font-size="15" fill="#475569">levels + geometry</text>
        <rect x="165" width="145" height="110" rx="18" fill="#fef3c7"/><text x="237" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">Worker/cache</text><text x="237" y="78" text-anchor="middle" font-size="15" fill="#475569">fetch + decode</text>
        <rect x="330" width="145" height="110" rx="18" fill="#dcfce7"/><text x="402" y="47" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">GPU textures</text><text x="402" y="78" text-anchor="middle" font-size="15" fill="#475569">current bricks</text>
      </g>
      <g transform="translate(35,228)">
        <rect width="475" height="120" rx="20" fill="#f0fdf4" stroke="#bbf7d0"/>
        <text x="237" y="38" text-anchor="middle" font-size="23" font-weight="800" fill="#166534">VTK.js scene</text>
        <text x="237" y="72" text-anchor="middle" font-size="16" fill="#334155">Progressively update ImageData / textures while the user rotates,</text>
        <text x="237" y="98" text-anchor="middle" font-size="16" fill="#334155">clips, zooms, or focuses on the tumor region.</text>
      </g>
      <text x="272" y="391" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Priority: exact ROI and geometry; progressive anatomy quality.</text>
    </g>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"><path d="M315 375H390"/><path d="M905 375H985"/></g>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="210" y="684" width="1180" height="72" rx="26" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="800" y="714" text-anchor="middle" font-size="20" font-weight="800" fill="#9a3412">“Lossless” must be defined by data type</text>
    <text x="800" y="742" text-anchor="middle" font-size="17" fill="#7c2d12">Tumor labels and patient-space transforms should remain exact; anatomical intensity can be progressive, with full-resolution chunks loaded on demand.</text>
  </g>
</svg>
