<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian splat concept for medical volume preview</title>
  <desc id="desc">A voxel MRI can be approximated with adaptive anisotropic Gaussian primitives for fast preview, while an exact tumor label and source volume remain separate.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".13"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
  </defs>
  <rect width="1600" height="720" fill="#f8fafc"/>
  <text x="800" y="58" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="750" fill="#0f172a">Gaussian Splats: Relevant Research, Not a Replacement for MRI</text>
  <text x="800" y="96" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" fill="#64748b">An explicit set of anisotropic Gaussians may provide a compact, rapidly rasterized preview of anatomy.</text>

  <g font-family="Inter,Arial,sans-serif" filter="url(#shadow)">
    <g transform="translate(65,160)">
      <rect width="395" height="435" rx="30" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="197" y="47" text-anchor="middle" font-size="27" font-weight="800" fill="#0f172a">Dense voxel volume</text>
      <g transform="translate(70,85)">
        <rect width="255" height="235" rx="25" fill="#111827"/>
        <g fill="#94a3b8" opacity=".5">
          <circle cx="38" cy="36" r="6"/><circle cx="68" cy="36" r="6"/><circle cx="98" cy="36" r="6"/><circle cx="128" cy="36" r="6"/><circle cx="158" cy="36" r="6"/><circle cx="188" cy="36" r="6"/><circle cx="218" cy="36" r="6"/>
          <circle cx="38" cy="70" r="6"/><circle cx="68" cy="70" r="6"/><circle cx="98" cy="70" r="6"/><circle cx="128" cy="70" r="6"/><circle cx="158" cy="70" r="6"/><circle cx="188" cy="70" r="6"/><circle cx="218" cy="70" r="6"/>
          <circle cx="38" cy="104" r="6"/><circle cx="68" cy="104" r="6"/><circle cx="98" cy="104" r="6"/><circle cx="128" cy="104" r="6"/><circle cx="158" cy="104" r="6"/><circle cx="188" cy="104" r="6"/><circle cx="218" cy="104" r="6"/>
          <circle cx="38" cy="138" r="6"/><circle cx="68" cy="138" r="6"/><circle cx="98" cy="138" r="6"/><circle cx="128" cy="138" r="6"/><circle cx="158" cy="138" r="6"/><circle cx="188" cy="138" r="6"/><circle cx="218" cy="138" r="6"/>
          <circle cx="38" cy="172" r="6"/><circle cx="68" cy="172" r="6"/><circle cx="98" cy="172" r="6"/><circle cx="128" cy="172" r="6"/><circle cx="158" cy="172" r="6"/><circle cx="188" cy="172" r="6"/><circle cx="218" cy="172" r="6"/>
          <circle cx="38" cy="206" r="6"/><circle cx="68" cy="206" r="6"/><circle cx="98" cy="206" r="6"/><circle cx="128" cy="206" r="6"/><circle cx="158" cy="206" r="6"/><circle cx="188" cy="206" r="6"/><circle cx="218" cy="206" r="6"/>
        </g>
        <ellipse cx="130" cy="120" rx="88" ry="102" fill="#cbd5e1" opacity=".24"/>
        <path d="M158 92c36 2 50 33 34 59-17 27-57 29-74 2-16-27 6-63 40-61z" fill="#ef4444" opacity=".9"/>
      </g>
      <text x="197" y="365" text-anchor="middle" font-size="17" fill="#475569">Regular sampling preserves the scalar field</text>
      <text x="197" y="393" text-anchor="middle" font-size="17" fill="#475569">but becomes expensive at high resolution.</text>
    </g>

    <g transform="translate(605,160)">
      <rect width="395" height="435" rx="30" fill="#fff" stroke="#a5b4fc" stroke-width="3"/>
      <text x="197" y="47" text-anchor="middle" font-size="27" font-weight="800" fill="#312e81">Adaptive Gaussian preview</text>
      <g transform="translate(55,80)">
        <rect width="285" height="240" rx="25" fill="#111827"/>
        <g opacity=".78">
          <ellipse cx="72" cy="68" rx="45" ry="18" transform="rotate(-25 72 68)" fill="#93c5fd"/>
          <ellipse cx="133" cy="53" rx="50" ry="21" transform="rotate(8 133 53)" fill="#c4b5fd"/>
          <ellipse cx="210" cy="75" rx="49" ry="20" transform="rotate(32 210 75)" fill="#a7f3d0"/>
          <ellipse cx="58" cy="142" rx="53" ry="23" transform="rotate(20 58 142)" fill="#bae6fd"/>
          <ellipse cx="136" cy="126" rx="58" ry="30" transform="rotate(-8 136 126)" fill="#ddd6fe"/>
          <ellipse cx="224" cy="142" rx="51" ry="22" transform="rotate(-30 224 142)" fill="#bbf7d0"/>
          <ellipse cx="98" cy="199" rx="52" ry="22" transform="rotate(24 98 199)" fill="#bfdbfe"/>
          <ellipse cx="190" cy="195" rx="60" ry="24" transform="rotate(-12 190 195)" fill="#c7d2fe"/>
        </g>
        <g fill="#ef4444" opacity=".9"><ellipse cx="187" cy="108" rx="28" ry="14" transform="rotate(18 187 108)"/><ellipse cx="214" cy="118" rx="22" ry="12" transform="rotate(-22 214 118)"/><ellipse cx="198" cy="139" rx="25" ry="13"/></g>
      </g>
      <text x="197" y="365" text-anchor="middle" font-size="17" fill="#475569">Fewer oriented primitives can represent</text>
      <text x="197" y="393" text-anchor="middle" font-size="17" fill="#475569">smooth anatomy and rasterize quickly.</text>
    </g>

    <g transform="translate(1145,160)">
      <rect width="395" height="435" rx="30" fill="#fff" stroke="#fca5a5" stroke-width="3"/>
      <text x="197" y="47" text-anchor="middle" font-size="27" font-weight="800" fill="#991b1b">Clinical truth remains separate</text>
      <g transform="translate(55,82)">
        <rect width="285" height="238" rx="25" fill="#f8fafc" stroke="#e2e8f0"/>
        <path d="M60 184c5-88 47-142 84-142 48 0 92 57 83 143-5 46-40 38-84 38-48 0-87 6-83-39z" fill="#d6d3d1" stroke="#78716c" stroke-width="4"/>
        <path d="M165 82c39 2 54 34 37 62-18 28-61 31-79 2-17-29 7-66 42-64z" fill="#ef4444"/>
        <path d="M165 82c39 2 54 34 37 62-18 28-61 31-79 2-17-29 7-66 42-64z" fill="none" stroke="#7f1d1d" stroke-width="5"/>
        <path d="M36 205h213" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
      </g>
      <text x="197" y="356" text-anchor="middle" font-size="17" fill="#475569">Keep the full MRI, physical transform,</text>
      <text x="197" y="384" text-anchor="middle" font-size="17" fill="#475569">and exact tumor labels as source data.</text>
      <text x="197" y="414" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">Use splats for preview or interpolation.</text>
    </g>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="6" marker-end="url(#arrow)"><path d="M460 380H590"/><path d="M1000 380H1130"/></g>
  <text x="800" y="660" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700" fill="#0f172a">Recommended interpretation for 3D-Mind: hybrid visualization, not “convert and discard the scan.”</text>
  <text x="800" y="692" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" fill="#64748b">Any splat representation must be evaluated for coordinate fidelity, tumor-boundary error, payload size, GPU memory and rendering speed.</text>
</svg>
