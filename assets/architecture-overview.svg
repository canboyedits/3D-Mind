<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">3D-Mind current prototype architecture</title>
  <desc id="desc">MRI data is preprocessed, segmented by nnU-Net, converted into aligned anatomy and tumor-mask volumes, and rendered in the browser with VTK.js.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.14"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker>
    <linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="72" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="700" fill="#0f172a">3D-Mind — Current Prototype Architecture</text>
  <text x="800" y="112" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="20" fill="#475569">Tumor segmentation is computed before the browser; VTK.js visualizes aligned anatomy and label data.</text>

  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(70,220)">
      <rect width="245" height="250" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <circle cx="122" cy="72" r="40" fill="#dbeafe"/><path d="M89 79c12-37 55-43 72-8 10 21-4 53-36 55-27 2-47-21-36-47z" fill="#3b82f6" opacity=".78"/>
      <text x="122" y="155" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">MRI Study</text>
      <text x="122" y="192" text-anchor="middle" font-size="18" fill="#475569">DICOM / NIfTI</text>
      <text x="122" y="222" text-anchor="middle" font-size="16" fill="#64748b">Image intensities + geometry</text>
    </g>

    <g transform="translate(380,220)">
      <rect width="265" height="250" rx="26" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <rect x="74" y="38" width="117" height="74" rx="15" fill="#ede9fe"/>
      <path d="M96 63h73M96 82h73" stroke="#7c3aed" stroke-width="10" stroke-linecap="round"/>
      <text x="132" y="155" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Pre-processing</text>
      <text x="132" y="190" text-anchor="middle" font-size="16" fill="#475569">Orientation • spacing • channels</text>
      <text x="132" y="220" text-anchor="middle" font-size="16" fill="#64748b">Intensity normalization</text>
    </g>

    <g transform="translate(710,190)">
      <rect width="300" height="310" rx="28" fill="#ffffff" stroke="#a5b4fc" stroke-width="3"/>
      <g transform="translate(70,35)" fill="none" stroke="#4f46e5" stroke-width="8">
        <path d="M0 0v110h45V30h45v80h45V0"/>
        <path d="M22 18h113M22 92h113" opacity=".45"/>
      </g>
      <text x="150" y="180" text-anchor="middle" font-size="30" font-weight="800" fill="#312e81">nnU-Net</text>
      <text x="150" y="215" text-anchor="middle" font-size="18" fill="#475569">Self-configured U-Net pipeline</text>
      <text x="150" y="248" text-anchor="middle" font-size="16" fill="#64748b">2D / 3D configuration selected</text>
      <text x="150" y="276" text-anchor="middle" font-size="16" fill="#64748b">for the training dataset</text>
    </g>

    <g transform="translate(1075,220)">
      <rect width="245" height="250" rx="26" fill="#ffffff" stroke="#fecaca" stroke-width="2"/>
      <circle cx="122" cy="77" r="52" fill="#fee2e2"/>
      <path d="M95 80c0-29 39-42 56-20 18 23 2 55-24 57-19 2-32-14-32-37z" fill="#ef4444"/>
      <text x="122" y="155" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Tumor Mask</text>
      <text x="122" y="190" text-anchor="middle" font-size="17" fill="#475569">Voxel-aligned label volume</text>
      <text x="122" y="220" text-anchor="middle" font-size="16" fill="#64748b">Preserves scan coordinates</text>
    </g>

    <g transform="translate(250,600)">
      <rect width="425" height="210" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="3"/>
      <text x="212" y="53" text-anchor="middle" font-size="27" font-weight="800" fill="#1e3a8a">Web-ready aligned data</text>
      <text x="45" y="98" font-size="18" fill="#334155">• Anatomical scalar volume</text>
      <text x="45" y="132" font-size="18" fill="#334155">• Tumor label volume / mask</text>
      <text x="45" y="166" font-size="18" fill="#334155">• Physical spacing, origin and direction</text>
    </g>

    <g transform="translate(820,565)">
      <rect width="560" height="260" rx="28" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
      <text x="280" y="54" text-anchor="middle" font-size="30" font-weight="800" fill="#166534">Browser Viewer — VTK.js</text>
      <text x="40" y="100" font-size="18" fill="#334155">RenderWindow + Renderer</text>
      <text x="300" y="100" font-size="18" fill="#334155">Volume + VolumeMapper</text>
      <text x="40" y="137" font-size="18" fill="#334155">GPU volume ray casting</text>
      <text x="300" y="137" font-size="18" fill="#334155">Color / opacity transfer functions</text>
      <text x="40" y="174" font-size="18" fill="#334155">Clipping planes</text>
      <text x="300" y="174" font-size="18" fill="#334155">Independent mask visibility / opacity</text>
      <rect x="40" y="202" width="480" height="36" rx="18" fill="#dcfce7"/>
      <text x="280" y="227" text-anchor="middle" font-size="17" font-weight="700" fill="#166534">Interactive inspection inside a standard web browser</text>
    </g>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)">
    <path d="M315 345H365"/>
    <path d="M645 345H695"/>
    <path d="M1010 345H1060"/>
    <path d="M1198 470C1180 545 690 530 620 590"/>
    <path d="M460 470V585"/>
    <path d="M675 705H805"/>
  </g>
  <text x="800" y="870" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" fill="#64748b">The MRI remains the anatomical source; nnU-Net supplies the segmentation label; VTK.js composes both in one patient-space scene.</text>
</svg>
