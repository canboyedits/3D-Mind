<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">MRI preprocessing and nnU-Net tumor segmentation</title>
  <desc id="desc">Illustrative MRI slices move through geometry validation and intensity preprocessing into nnU-Net, producing a tumor mask in the same coordinate system.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="9" flood-opacity=".13"/></filter>
  </defs>
  <rect width="1600" height="760" fill="#f8fafc"/>
  <text x="800" y="62" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="750" fill="#0f172a">MRI Pre-processing and Tumor Segmentation</text>
  <text x="800" y="100" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" fill="#64748b">Conceptual view — exact operations depend on the nnU-Net dataset fingerprint and trained configuration.</text>

  <g font-family="Inter,Arial,sans-serif" filter="url(#shadow)">
    <g transform="translate(70,170)">
      <rect width="290" height="430" rx="26" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="145" y="45" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">MRI modality channels</text>
      <g transform="translate(40,75)">
        <rect width="90" height="90" rx="15" fill="#111827"/>
        <ellipse cx="45" cy="46" rx="34" ry="39" fill="#cbd5e1"/><ellipse cx="45" cy="46" rx="24" ry="29" fill="#475569"/><ellipse cx="45" cy="46" rx="10" ry="15" fill="#0f172a"/><path d="M59 34c10 2 15 11 11 20-4 8-16 10-22 3-6-7 0-20 11-23z" fill="#f8fafc" opacity=".75"/>
        <rect x="120" width="90" height="90" rx="15" fill="#111827"/>
        <ellipse cx="165" cy="46" rx="34" ry="39" fill="#94a3b8"/><ellipse cx="165" cy="46" rx="24" ry="29" fill="#e2e8f0"/><ellipse cx="165" cy="46" rx="10" ry="15" fill="#475569"/><path d="M181 36c9 2 13 11 9 18-4 8-15 9-20 3-5-7 1-19 11-21z" fill="#f8fafc"/>
        <rect y="120" width="90" height="90" rx="15" fill="#111827"/>
        <ellipse cx="45" cy="166" rx="34" ry="39" fill="#e2e8f0"/><ellipse cx="45" cy="166" rx="24" ry="29" fill="#64748b"/><ellipse cx="45" cy="166" rx="10" ry="15" fill="#1e293b"/><path d="M58 151c11 2 15 12 10 21-5 8-17 8-22 1-5-8 1-20 12-22z" fill="#f1f5f9"/>
        <rect x="120" y="120" width="90" height="90" rx="15" fill="#111827"/>
        <ellipse cx="165" cy="166" rx="34" ry="39" fill="#a8a29e"/><ellipse cx="165" cy="166" rx="24" ry="29" fill="#334155"/><ellipse cx="165" cy="166" rx="10" ry="15" fill="#020617"/><path d="M179 150c10 1 16 11 12 20-4 9-17 11-23 3-6-8 0-21 11-23z" fill="#e5e7eb"/>
      </g>
      <text x="145" y="330" text-anchor="middle" font-size="17" fill="#475569">Different sequences become</text>
      <text x="145" y="357" text-anchor="middle" font-size="17" fill="#475569">input channels when available.</text>
      <text x="145" y="397" text-anchor="middle" font-size="15" fill="#64748b">Illustration only — not a diagnostic image.</text>
    </g>

    <g transform="translate(435,170)">
      <rect width="290" height="430" rx="26" fill="#fff" stroke="#c4b5fd" stroke-width="2"/>
      <text x="145" y="47" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Geometry + intensity</text>
      <g transform="translate(45,85)" font-size="17" fill="#334155">
        <circle cx="15" cy="10" r="10" fill="#8b5cf6"/><text x="40" y="17">Validate orientation</text>
        <circle cx="15" cy="70" r="10" fill="#8b5cf6"/><text x="40" y="77">Preserve voxel spacing</text>
        <circle cx="15" cy="130" r="10" fill="#8b5cf6"/><text x="40" y="137">Resample as configured</text>
        <circle cx="15" cy="190" r="10" fill="#8b5cf6"/><text x="40" y="197">Normalize MRI channels</text>
        <circle cx="15" cy="250" r="10" fill="#8b5cf6"/><text x="40" y="257">Retain spatial transform</text>
      </g>
      <rect x="35" y="370" width="220" height="38" rx="19" fill="#ede9fe"/>
      <text x="145" y="396" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">Prepared for trained nnU-Net</text>
    </g>

    <g transform="translate(800,170)">
      <rect width="290" height="430" rx="26" fill="#fff" stroke="#a5b4fc" stroke-width="3"/>
      <g transform="translate(65,60)" fill="none" stroke="#4f46e5" stroke-width="9"><path d="M0 0v125h50V35h60v90h50V0"/><path d="M25 20h110M25 105h110" opacity=".42"/></g>
      <text x="145" y="235" text-anchor="middle" font-size="30" font-weight="800" fill="#312e81">nnU-Net inference</text>
      <text x="145" y="278" text-anchor="middle" font-size="17" fill="#475569">A dataset-adapted U-Net</text>
      <text x="145" y="307" text-anchor="middle" font-size="17" fill="#475569">predicts a semantic label</text>
      <text x="145" y="336" text-anchor="middle" font-size="17" fill="#475569">for every voxel.</text>
      <rect x="40" y="370" width="210" height="38" rx="19" fill="#e0e7ff"/>
      <text x="145" y="396" text-anchor="middle" font-size="16" font-weight="700" fill="#3730a3">Supervised segmentation model</text>
    </g>

    <g transform="translate(1165,170)">
      <rect width="365" height="430" rx="26" fill="#fff" stroke="#fca5a5" stroke-width="3"/>
      <text x="182" y="48" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Aligned tumor mask</text>
      <g transform="translate(83,80)">
        <rect width="200" height="200" rx="25" fill="#111827"/>
        <ellipse cx="100" cy="100" rx="77" ry="88" fill="#d1d5db"/><ellipse cx="100" cy="100" rx="57" ry="68" fill="#64748b"/><ellipse cx="100" cy="100" rx="23" ry="35" fill="#1f2937"/>
        <path d="M127 69c30 3 41 29 27 51-14 22-48 24-61 3-13-22 5-57 34-54z" fill="#ef4444" opacity=".92"/>
        <path d="M127 69c30 3 41 29 27 51-14 22-48 24-61 3-13-22 5-57 34-54z" fill="none" stroke="#fecaca" stroke-width="5"/>
      </g>
      <text x="182" y="326" text-anchor="middle" font-size="17" fill="#475569">The prediction is restored to the</text>
      <text x="182" y="355" text-anchor="middle" font-size="17" fill="#475569">MRI coordinate system before display.</text>
      <rect x="55" y="380" width="255" height="38" rx="19" fill="#fee2e2"/>
      <text x="182" y="406" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">MRI and mask must remain registered</text>
    </g>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"><path d="M360 385H420"/><path d="M725 385H785"/><path d="M1090 385H1150"/></g>
  <text x="800" y="688" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700" fill="#0f172a">Output used by 3D-Mind: anatomical MRI volume + tumor label volume + shared physical geometry</text>
  <text x="800" y="721" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" fill="#64748b">The mask is a model prediction, not a clinical diagnosis. Validation against expert annotations is required for medical use.</text>
</svg>
